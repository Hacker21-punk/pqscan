name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - run: go test -v -race ./... 2>&1 || echo "No tests yet"
      - run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o pqscan-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/pqscan/
      - uses: actions/upload-artifact@v4
        with:
          name: pqscan-${{ matrix.goos }}-${{ matrix.goarch }}
          path: pqscan-*

  # Self-scan: pqscan scans itself (meta!)
  self-scan:
    name: Self Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - run: go build -o pqscan ./cmd/pqscan/
      - name: Scan github.com (our host)
        continue-on-error: true
        run: ./pqscan github.com