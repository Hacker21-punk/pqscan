# =============================================================
# PQScan — Post-Quantum Cryptography Vulnerability Scanner
# =============================================================
# 
# This workflow scans your domains for quantum-vulnerable
# encryption and fails if critical findings are detected.
#
# SETUP:
#   1. Copy this file to .github/workflows/pqscan.yml
#   2. Set PQSCAN_TARGETS secret or edit targets below
#   3. Push — it runs automatically
#
# TRIGGERS:
#   - Every push to main
#   - Every pull request
#   - Weekly scheduled scan (Monday 9am UTC)
#   - Manual trigger from Actions tab
# =============================================================

name: PQScan — Quantum Vulnerability Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly scan — every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      targets:
        description: 'Domains to scan (space-separated)'
        required: false
        default: ''
      scan_mode:
        description: 'Scan mode'
        required: false
        default: 'standard'
        type: choice
        options:
          - quick
          - standard
          - deep
          - chain

# Prevent concurrent scans
concurrency:
  group: pqscan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quantum-scan:
    name: Quantum Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only run on main repo (not forks) for scheduled runs
    if: >
      github.event_name != 'schedule' || 
      github.repository == github.event.repository.full_name

    steps:
      # ─────────────────────────────────────
      # 1. Checkout the repository
      # ─────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────────────
      # 2. Set up Go
      # ─────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # ─────────────────────────────────────
      # 3. Build pqscan
      # ─────────────────────────────────────
      - name: Build pqscan
        run: |
          go mod tidy
          go build -o pqscan ./cmd/pqscan/
          chmod +x pqscan
          echo "pqscan built successfully"
          ./pqscan --version

      # ─────────────────────────────────────
      # 4. Determine scan targets
      # ─────────────────────────────────────
      - name: Determine targets
        id: targets
        run: |
          # Priority: manual input > secret > default
          if [ -n "${{ github.event.inputs.targets }}" ]; then
            echo "targets=${{ github.event.inputs.targets }}" >> $GITHUB_OUTPUT
            echo "Using manual targets: ${{ github.event.inputs.targets }}"
          elif [ -n "${{ secrets.PQSCAN_TARGETS }}" ]; then
            echo "targets=${{ secrets.PQSCAN_TARGETS }}" >> $GITHUB_OUTPUT
            echo "Using targets from secret"
          elif [ -f "pqscan-targets.txt" ]; then
            TARGETS=$(grep -v '^#' pqscan-targets.txt | grep -v '^$' | tr '\n' ' ')
            echo "targets=$TARGETS" >> $GITHUB_OUTPUT
            echo "Using targets from pqscan-targets.txt"
          else
            # ============================================
            # EDIT THIS: Add your domains here
            # ============================================
            echo "targets=example.com" >> $GITHUB_OUTPUT
            echo "Using default targets — edit workflow to add your domains"
          fi

      # ─────────────────────────────────────
      # 5. Run the scan (JSON for processing)
      # ─────────────────────────────────────
      - name: Run quantum scan (JSON)
        id: scan
        continue-on-error: true
        run: |
          TARGETS="${{ steps.targets.outputs.targets }}"
          
          echo "Scanning targets: $TARGETS"
          echo ""
          
          # Run scan and capture output
          ./pqscan --format json -o pqscan-results.json $TARGETS 2>&1 | tee scan-output.txt
          
          SCAN_EXIT=$?
          echo "exit_code=$SCAN_EXIT" >> $GITHUB_OUTPUT
          
          if [ $SCAN_EXIT -eq 0 ]; then
            echo "status=SAFE" >> $GITHUB_OUTPUT
            echo "✅ All endpoints are quantum-safe"
          else
            echo "status=CRITICAL" >> $GITHUB_OUTPUT
            echo "🔴 Critical quantum vulnerabilities found"
          fi

      # ─────────────────────────────────────
      # 6. Generate HTML report
      # ─────────────────────────────────────
      - name: Generate HTML report
        if: always()
        continue-on-error: true
        run: |
          TARGETS="${{ steps.targets.outputs.targets }}"
          ./pqscan --format html -o pqscan-report.html $TARGETS 2>&1 || true

      # ─────────────────────────────────────
      # 7. Generate CLI report (for logs)
      # ─────────────────────────────────────
      - name: Print scan results
        if: always()
        continue-on-error: true
        run: |
          TARGETS="${{ steps.targets.outputs.targets }}"
          ./pqscan $TARGETS 2>&1 || true

      # ─────────────────────────────────────
      # 8. Parse results for summary
      # ─────────────────────────────────────
      - name: Parse results
        id: results
        if: always()
        run: |
          if [ -f pqscan-results.json ]; then
            # Extract key metrics from JSON
            TOTAL=$(cat pqscan-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data.get('summary', {}).get('total_endpoints', 0))
          " 2>/dev/null || echo "0")
            
            CRITICAL=$(cat pqscan-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data.get('summary', {}).get('critical', 0))
          " 2>/dev/null || echo "0")
            
            SAFE=$(cat pqscan-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data.get('summary', {}).get('safe', 0))
          " 2>/dev/null || echo "0")
            
            SCORE=$(cat pqscan-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data.get('summary', {}).get('risk_score', 0))
          " 2>/dev/null || echo "0")
            
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "safe=$SAFE" >> $GITHUB_OUTPUT
            echo "score=$SCORE" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "critical=0" >> $GITHUB_OUTPUT
            echo "safe=0" >> $GITHUB_OUTPUT
            echo "score=0" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────
      # 9. Upload reports as artifacts
      # ─────────────────────────────────────
      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pqscan-reports-${{ github.sha }}
          path: |
            pqscan-results.json
            pqscan-report.html
            scan-output.txt
          retention-days: 90

      # ─────────────────────────────────────
      # 10. Comment on PR with results
      # ─────────────────────────────────────
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.scan.outputs.status }}';
            const total = '${{ steps.results.outputs.total }}';
            const critical = '${{ steps.results.outputs.critical }}';
            const safe = '${{ steps.results.outputs.safe }}';
            const score = '${{ steps.results.outputs.score }}';
            
            let emoji = '🔴';
            let statusText = 'CRITICAL';
            if (status === 'SAFE') {
              emoji = '🟢';
              statusText = 'SAFE';
            }
            
            const body = `## ${emoji} PQScan — Quantum Vulnerability Report
            
            | Metric | Value |
            |--------|-------|
            | **Status** | ${statusText} |
            | **Risk Score** | ${score}/100 |
            | **Total Endpoints** | ${total} |
            | **Critical (Shor's)** | ${critical} |
            | **Quantum-Safe** | ${safe} |
            
            ${status === 'CRITICAL' ? 
              '⚠️ **Critical quantum vulnerabilities detected.** These endpoints use encryption that will be broken by quantum computers (Shor\'s algorithm). See the full report in Actions artifacts.' :
              '✅ **All scanned endpoints use quantum-safe cryptography.** No action needed.'
            }
            
            <details>
            <summary>What does this mean?</summary>
            
            - **Critical**: Algorithm completely broken by quantum computers (RSA, ECDSA, ECDH, DH)
            - **Safe**: Algorithm resistant to quantum attacks (ML-KEM, ML-DSA, AES-256)
            - **HNDL Risk**: Adversaries may record encrypted traffic today and decrypt it when quantum computers arrive
            - **CNSA 2.0**: NSA mandates complete PQC migration by 2033-2035
            
            </details>
            
            📊 [Download full HTML report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) from Actions artifacts.
            
            ---
            *Generated by [pqscan](https://github.com/${{ github.repository }}) v0.1.0*`;
            
            // Find existing comment to update
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(c => 
              c.body.includes('PQScan — Quantum Vulnerability Report')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      # ─────────────────────────────────────
      # 11. Create job summary
      # ─────────────────────────────────────
      - name: Create job summary
        if: always()
        run: |
          STATUS="${{ steps.scan.outputs.status }}"
          TOTAL="${{ steps.results.outputs.total }}"
          CRITICAL="${{ steps.results.outputs.critical }}"
          SAFE="${{ steps.results.outputs.safe }}"
          SCORE="${{ steps.results.outputs.score }}"
          
          if [ "$STATUS" = "SAFE" ]; then
            EMOJI="🟢"
          else
            EMOJI="🔴"
          fi
          
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ${EMOJI} PQScan — Quantum Vulnerability Report
          
          | Metric | Value |
          |--------|-------|
          | **Status** | ${STATUS} |
          | **Risk Score** | ${SCORE}/100 |
          | **Total Endpoints** | ${TOTAL} |
          | **Critical Findings** | ${CRITICAL} |
          | **Quantum-Safe** | ${SAFE} |
          | **Scan Date** | $(date -u '+%Y-%m-%d %H:%M UTC') |
          | **Targets** | ${{ steps.targets.outputs.targets }} |
          
          ### CNSA 2.0 Compliance Timeline
          
          | Year | Requirement | Status |
          |------|-------------|--------|
          | 2025 | Prefer PQC for new systems | $([ "$CRITICAL" = "0" ] && echo "✅ PASSING" || echo "❌ FAILING") |
          | 2027 | New systems MUST use PQC | $([ "$CRITICAL" = "0" ] && echo "✅ PASSING" || echo "❌ FAILING") |
          | 2033 | All protocols quantum-safe | $([ "$CRITICAL" = "0" ] && echo "✅ PASSING" || echo "❌ FAILING") |
          | 2035 | Complete migration | $([ "$CRITICAL" = "0" ] && echo "✅ PASSING" || echo "❌ FAILING") |
          
          ---
          📊 Download the full HTML report from the **Artifacts** section below.
          EOF

      # ─────────────────────────────────────
      # 12. Fail if critical findings
      # ─────────────────────────────────────
      - name: Check scan results
        if: always()
        run: |
          if [ "${{ steps.scan.outputs.status }}" = "CRITICAL" ]; then
            echo ""
            echo "============================================"
            echo "🔴 QUANTUM VULNERABILITY SCAN FAILED"
            echo "============================================"
            echo ""
            echo "Critical quantum-vulnerable endpoints detected."
            echo "These endpoints use encryption that will be"
            echo "broken by quantum computers."
            echo ""
            echo "Review the scan report in Actions artifacts"
            echo "and migrate to post-quantum algorithms."
            echo ""
            echo "To allow this to pass (not recommended):"
            echo "  Remove this step or change continue-on-error"
            echo "============================================"
            exit 1
          else
            echo "✅ Quantum vulnerability scan passed"
          fi