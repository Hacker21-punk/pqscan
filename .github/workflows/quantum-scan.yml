name: Quantum Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  scan:
    name: Quantum Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build pqscan
        run: |
          go mod tidy
          go build -o pqscan .

      - name: Run scan
        run: |
          ./pqscan google.com 2>&1 || true
          ./pqscan --format html -o report.html google.com 2>&1 || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quantum-report
          path: report.html
          if-no-files-found: ignore
